<div class="pt-4 lg:pt-4 lg:px-3 lg:pb-5 mx-3 pb-4">

    <div class="flex flex-column lg:flex-row justify-content-between align-items-start lg:align-items-center mb-5 gap-3">
        <div>
            <div class="text-4xl font-bold text-900">Districts</div>
            <div class="text-500 mt-1">Administrative geography used for routing and case reporting.</div>
        </div>
        <p-button *ngIf="canManage" label="Add District" icon="pi pi-plus" styleClass="border-round-lg"
            (onClick)="openCreateDialog()" />
    </div>

    <div class="card p-4 surface-card shadow-3 border-0 border-round-2xl">
        <p-table [value]="districts" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]"
            [loading]="loading" [paginator]="true" [rowHover]="true">
            <ng-template #header>
                <tr>
                    <th pSortableColumn="name">Name <p-sortIcon field="name" /></th>
                    <th pSortableColumn="province">Province <p-sortIcon field="province" /></th>
                    <th pSortableColumn="settlement_type">Settlement Type <p-sortIcon field="settlement_type" /></th>
                    <th>Coordinates</th>
                    <th>Actions</th>
                </tr>
            </ng-template>
            <ng-template #body let-d>
                <tr>
                    <td class="font-semibold">{{ d.name }}</td>
                    <td>{{ d.province }}</td>
                    <td><p-tag [value]="humanizeSettlement(d.settlement_type)" severity="secondary" /></td>
                    <td>{{ d.latitude != null && d.longitude != null ? (d.latitude + ', ' + d.longitude) : '—' }}</td>
                    <td>
                        <div class="flex gap-2">
                            <p-button icon="pi pi-eye" severity="info" variant="outlined" pTooltip="View"
                                [routerLink]="['/district', d.id]" />
                            <ng-container *ngIf="canManage">
                                <p-button icon="pi pi-pencil" severity="info" variant="outlined" pTooltip="Edit"
                                    (onClick)="openEditDialog(d)" />
                                <p-button icon="pi pi-trash" severity="danger" variant="outlined" pTooltip="Delete"
                                    (onClick)="confirmDelete($event, d)" />
                            </ng-container>
                        </div>
                    </td>
                </tr>
            </ng-template>
            <ng-template #emptymessage>
                <tr><td colspan="5" class="text-center py-4">No districts found.</td></tr>
            </ng-template>
        </p-table>
    </div>

    <!-- Create / Edit dialog -->
    <p-dialog [header]="editingDistrict ? 'Edit District' : 'Add District'" [(visible)]="showFormDialog"
        [modal]="true" [style]="{ width: '32rem' }" [breakpoints]="{ '575px': '92vw' }"
        (onHide)="closeFormDialog()">
        <div class="flex flex-column gap-3 mt-2">
            <div class="field">
                <label class="form-label">Name *</label>
                <input pInputText [(ngModel)]="form.name" placeholder="e.g. Harare Central" class="w-full border-round-lg" />
            </div>
            <div class="field">
                <label class="form-label">Province *</label>
                <input pInputText [(ngModel)]="form.province" placeholder="e.g. Harare" class="w-full border-round-lg" />
            </div>
            <div class="field">
                <label class="form-label">Settlement Type</label>
                <p-select [options]="settlementTypeOptions" [(ngModel)]="form.settlement_type"
                    optionLabel="label" optionValue="value" styleClass="w-full border-round-lg" appendTo="body" />
            </div>
            <div class="grid">
                <div class="col-6">
                    <label class="form-label">Latitude</label>
                    <p-inputNumber [(ngModel)]="form.latitude" [minFractionDigits]="0" [maxFractionDigits]="6"
                        styleClass="w-full" inputStyleClass="w-full border-round-lg" placeholder="Optional" />
                </div>
                <div class="col-6">
                    <label class="form-label">Longitude</label>
                    <p-inputNumber [(ngModel)]="form.longitude" [minFractionDigits]="0" [maxFractionDigits]="6"
                        styleClass="w-full" inputStyleClass="w-full border-round-lg" placeholder="Optional" />
                </div>
            </div>
        </div>
        <ng-template #footer>
            <p-button label="Cancel" severity="secondary" [outlined]="true" (onClick)="closeFormDialog()" />
            <p-button [label]="editingDistrict ? 'Save Changes' : 'Create District'" icon="pi pi-check"
                styleClass="border-round-lg" [loading]="saving" [disabled]="!isFormValid" (onClick)="save()" />
        </ng-template>
    </p-dialog>
</div>
