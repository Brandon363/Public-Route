<div class="pt-4 lg:pt-4 lg:px-3 lg:pb-5 mx-3 pb-4">

    <div class="flex flex-column lg:flex-row justify-content-between align-items-start lg:align-items-center mb-5 gap-3">
        <div>
            <div class="text-4xl font-bold text-900">Organisation Units</div>
            <div class="text-500 mt-1">Departments responsible for resolving service categories within a jurisdiction.</div>
        </div>
        <p-button *ngIf="canManage" label="Add Unit" icon="pi pi-plus" styleClass="border-round-lg"
            (onClick)="openCreateDialog()" />
    </div>

    <div class="card p-4 surface-card shadow-3 border-0 border-round-2xl">
        <p-table [value]="units" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]"
            [loading]="loading" [paginator]="true" [rowHover]="true">
            <ng-template #header>
                <tr>
                    <th pSortableColumn="name">Name <p-sortIcon field="name" /></th>
                    <th>Service Categories</th>
                    <th>Jurisdiction</th>
                    <th pSortableColumn="is_active">Status <p-sortIcon field="is_active" /></th>
                    <th>Actions</th>
                </tr>
            </ng-template>
            <ng-template #body let-u>
                <tr>
                    <td class="font-semibold">{{ u.name }}</td>
                    <td>
                        <div class="flex gap-1 flex-wrap">
                            <p-tag *ngFor="let c of u.service_categories" [value]="categoryLabel(c)" severity="info" />
                            <span *ngIf="!u.service_categories?.length" class="text-500 text-sm">—</span>
                        </div>
                    </td>
                    <td class="text-sm">{{ jurisdictionLabel(u) }}</td>
                    <td>
                        <p-tag [value]="u.is_active ? 'Active' : 'Inactive'" [severity]="u.is_active ? 'success' : 'secondary'" />
                    </td>
                    <td>
                        <div class="flex gap-2">
                            <p-button icon="pi pi-eye" severity="info" variant="outlined" pTooltip="View"
                                [routerLink]="['/organisation-unit', u.id]" />
                            <ng-container *ngIf="canManage">
                                <p-button icon="pi pi-pencil" severity="info" variant="outlined" pTooltip="Edit"
                                    (onClick)="openEditDialog(u)" />
                                <p-button [icon]="u.is_active ? 'pi pi-ban' : 'pi pi-check-circle'" severity="warn" variant="outlined"
                                    [pTooltip]="u.is_active ? 'Deactivate' : 'Activate'" (onClick)="toggleActive(u)" />
                                <p-button icon="pi pi-trash" severity="danger" variant="outlined" pTooltip="Delete"
                                    (onClick)="confirmDelete($event, u)" />
                            </ng-container>
                        </div>
                    </td>
                </tr>
            </ng-template>
            <ng-template #emptymessage>
                <tr><td colspan="5" class="text-center py-4">No organisation units found.</td></tr>
            </ng-template>
        </p-table>
    </div>

    <!-- Create / Edit dialog -->
    <p-dialog [header]="editingUnit ? 'Edit Organisation Unit' : 'Add Organisation Unit'" [(visible)]="showFormDialog"
        [modal]="true" [style]="{ width: '34rem' }" [breakpoints]="{ '575px': '92vw' }"
        (onHide)="closeFormDialog()">
        <div class="flex flex-column gap-3 mt-2">
            <div class="field">
                <label class="form-label">Name *</label>
                <input pInputText [(ngModel)]="form.name" placeholder="e.g. Water & Sanitation Department"
                    class="w-full border-round-lg" />
            </div>
            <div class="field">
                <label class="form-label">Service Categories</label>
                <p-multiSelect [options]="categoryOptions" [(ngModel)]="form.service_categories"
                    optionLabel="label" optionValue="value" placeholder="Select categories this unit handles"
                    styleClass="w-full border-round-lg" appendTo="body" display="chip" />
            </div>
            <div class="field">
                <label class="form-label">Jurisdiction</label>
                <p class="text-500 text-xs mt-0 mb-2">Leave empty to cover every district.</p>
                <p-multiSelect [options]="districtOptions" [(ngModel)]="form.jurisdiction"
                    optionLabel="label" optionValue="value" placeholder="All districts (default)"
                    styleClass="w-full border-round-lg" appendTo="body" display="chip" [filter]="true" />
            </div>
            <div class="field flex align-items-center gap-2" *ngIf="editingUnit">
                <p-toggleSwitch [(ngModel)]="form.is_active" />
                <label class="form-label m-0">Active</label>
            </div>
        </div>
        <ng-template #footer>
            <p-button label="Cancel" severity="secondary" [outlined]="true" (onClick)="closeFormDialog()" />
            <p-button [label]="editingUnit ? 'Save Changes' : 'Create Unit'" icon="pi pi-check"
                styleClass="border-round-lg" [loading]="saving" [disabled]="!isFormValid" (onClick)="save()" />
        </ng-template>
    </p-dialog>
</div>
